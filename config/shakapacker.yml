# Note: You must restart bin/shakapacker-dev-server for changes to take effect

default: &default
  source_path: client/app
  source_entry_path: packs
  public_root_path: public
  public_output_path: packs
  cache_path: tmp/shakapacker
  webpack_compile_output: true

  # Use babel-loader instead of swc-loader (Shakapacker 9.x defaults to swc)
  # We have babel configured with all necessary presets
  # Available options: 'swc' (default, 20x faster), 'babel', or 'esbuild'
  javascript_transpiler: 'babel'

  # Additional paths webpack should lookup modules
  # ['app/assets', 'engine/foo/app/assets']
  additional_paths: []

  # Reload manifest.json on all requests so we reload latest compiled packs
  cache_manifest: false

development:
  <<: *default
  # Must be true to enable webpack-dev-server and HMR
  compile: true

  # Reference: https://webpack.js.org/configuration/dev-server/
  dev_server:
    host: 0.0.0.0
    port: 3035
    # Hot Module Replacement updates modules while the application is running without a full reload
    hmr: true
    client:
      # Should we show a full-screen overlay in the browser when there are compiler errors or warnings?
      overlay: true
      # Explicit WebSocket URL configuration - with host networking, use localhost
      webSocketURL:
        hostname: 'localhost'
        pathname: '/ws'
        port: 3035
        protocol: 'ws'
      logging: 'info'
      progress: true
      reconnect: 10
    webSocketServer: 'ws'
    compress: true
    allowed_hosts: 'all'
    pretty: true
    headers:
      'Access-Control-Allow-Origin': '*'
      'Access-Control-Allow-Methods': 'GET, POST, PUT, DELETE, PATCH, OPTIONS'
      'Access-Control-Allow-Headers': 'X-Requested-With, content-type, Authorization'
    # Watch options for file changes
    static:
      watch:
        ignored: '**/node_modules/**'

test:
  <<: *default
  compile: true

  # Compile test packs to a separate directory
  public_output_path: packs-test

production:
  <<: *default

  # Production depends on precompilation of packs prior to booting for performance.
  compile: false

  # Cache manifest.json for performance
  cache_manifest: true
